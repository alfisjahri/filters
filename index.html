<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filter</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f4f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            border: 3px solid black;
            padding: 10px 20px;
            background-color: #ffb000;
            box-shadow: 4px 4px 0px black;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 2rem);
        }
        .container {
            position: relative;
            border: 5px solid black;
            box-shadow: 6px 6px 0px black;
            margin-top: 1rem;
            background-color: black;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            overflow: hidden;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
        }
        .controls {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            max-width: 640px;
        }
        button {
            flex: 1 1 auto;
            padding: 12px 20px;
            border: 4px solid black;
            background-color: #a3a3a3; 
            color: black;
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 4px 4px 0px black;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px black;
        }
        button.active-mode#btnSpiderman { background-color: #ff5c5c; }
        button.active-mode#btnPeace { background-color: #4ade80; }
    </style>
</head>
<body>
    <h1>filters</h1>
    
    <div class="container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement" width="640" height="480"></canvas>
    </div>
    
    <div class="controls">
        <button id="btnSpiderman">spiderman</button>
        <button id="btnPeace">blur</button>
    </div>

    <!-- AUDIO FILES -->
    <audio id="audioSpiderman" loop>
        <source src="spiderman.mp3" type="audio/mpeg">
    </audio>
    <audio id="audioPeace" loop>
        <source src="peace.mp3" type="audio/mpeg">
    </audio>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');
        const canvasCtx = canvasElement.getContext('2d');
        const btnSpiderman = document.getElementById('btnSpiderman');
        const btnPeace = document.getElementById('btnPeace');
        const audioSpiderman = document.getElementById('audioSpiderman');
        const audioPeace = document.getElementById('audioPeace');

        let currentMode = ''; 
        let videoBlurred = false; 

        // Logika Gestur Tutup Tangan (Hysteresis)
        let isClosed = false;
        const closeRatio = 0.16;
        const openRatio = 0.30;
        
        let currentFilterIndex = 0;
        const totalMultiverseStyles = 5;

        function switchAudio(mode) {
            if (mode === 'spiderman') {
                audioPeace.pause(); audioPeace.currentTime = 0;
                audioSpiderman.play().catch(() => {});
            } else if (mode === 'peace') {
                audioSpiderman.pause(); audioSpiderman.currentTime = 0;
                audioPeace.play().catch(() => {});
            }
        }

        btnSpiderman.addEventListener('click', () => {
            currentMode = 'spiderman';
            btnSpiderman.classList.add('active-mode');
            btnPeace.classList.remove('active-mode');
            if (videoBlurred) {
                videoElement.style.filter = 'none';
                videoBlurred = false;
            }
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            switchAudio('spiderman');
        });

        btnPeace.addEventListener('click', () => {
            currentMode = 'peace';
            btnPeace.classList.add('active-mode');
            btnSpiderman.classList.remove('active-mode');
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            switchAudio('peace');
        });

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0, 
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });

        // Hitung jarak portal (Geometry)
        function getPortalWidth(p1, p2, p3, p4, w, h) {
            const topW = Math.hypot((p3.x - p1.x) * w, (p3.y - p1.y) * h);
            const bottomW = Math.hypot((p4.x - p2.x) * w, (p4.y - p2.y) * h);
            return (topW + bottomW) / 2.0;
        }

        hands.onResults((results) => {
            if (videoElement.videoWidth && canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (currentMode === 'spiderman') {
                const isTwoHands = results.multiHandLandmarks && results.multiHandLandmarks.length === 2;
                
                if (isTwoHands) {
                    const lmLeft = results.multiHandLandmarks[0];
                    const lmRight = results.multiHandLandmarks[1];
                    
                    const p1 = lmLeft[8];
                    const p2 = lmLeft[4];
                    const p3 = lmRight[8];
                    const p4 = lmRight[4];

                    // Deteksi gestur ganti filter (Rapatkan tangan)
                    const width = getPortalWidth(p1, p2, p3, p4, canvasElement.width, canvasElement.height);
                    if (!isClosed && width < closeRatio * canvasElement.width) {
                        isClosed = true;
                        currentFilterIndex = (currentFilterIndex + 1) % totalMultiverseStyles;
                    } else if (isClosed && width > openRatio * canvasElement.width) {
                        isClosed = false;
                    }

                    canvasCtx.save();
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                    canvasCtx.lineTo(p4.x * canvasElement.width, p4.y * canvasElement.height);
                    canvasCtx.lineTo(p3.x * canvasElement.width, p3.y * canvasElement.height);
                    canvasCtx.closePath();
                    
                    canvasCtx.clip();
                    
                    // Eksekusi Filter Spider-Verse (CSS via Canvas)
                    if (currentFilterIndex === 0) {
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                        canvasCtx.globalCompositeOperation = 'screen';
                        canvasCtx.globalAlpha = 0.7;
                        canvasCtx.filter = 'sepia(100%) hue-rotate(-50deg) saturate(500%)';
                        canvasCtx.drawImage(results.image, 20, 0, canvasElement.width, canvasElement.height);
                        canvasCtx.filter = 'sepia(100%) hue-rotate(150deg) saturate(500%)';
                        canvasCtx.drawImage(results.image, -20, 0, canvasElement.width, canvasElement.height);
                    } else if (currentFilterIndex === 1) {
                        canvasCtx.filter = 'contrast(250%) grayscale(100%) brightness(120%)';
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                        canvasCtx.globalCompositeOperation = 'multiply';
                        canvasCtx.fillStyle = 'rgba(255, 105, 180, 0.5)'; 
                        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                    } else if (currentFilterIndex === 2) {
                        const slices = 10;
                        const sliceH = canvasElement.height / slices;
                        canvasCtx.filter = 'saturate(200%) contrast(150%) hue-rotate(45deg)';
                        for (let i = 0; i < slices; i++) {
                            const offset = (Math.random() - 0.5) * 60; 
                            canvasCtx.drawImage(results.image, 0, i * sliceH, canvasElement.width, sliceH, offset, i * sliceH, canvasElement.width, sliceH);
                        }
                    } else if (currentFilterIndex === 3) {
                        canvasCtx.filter = 'invert(100%) hue-rotate(270deg) contrast(250%) saturate(300%)';
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                    } else if (currentFilterIndex === 4) {
                        canvasCtx.filter = 'sepia(100%) saturate(400%) hue-rotate(340deg) contrast(200%)';
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                    }

                    canvasCtx.restore();

                    // Garis Portal. Hijau kalau lagi posisi rapat/ganti filter, Putih kalau normal.
                    canvasCtx.lineWidth = 4;
                    canvasCtx.strokeStyle = isClosed ? '#4ade80' : 'white';
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                    canvasCtx.lineTo(p4.x * canvasElement.width, p4.y * canvasElement.height);
                    canvasCtx.lineTo(p3.x * canvasElement.width, p3.y * canvasElement.height);
                    canvasCtx.closePath();
                    canvasCtx.stroke();
                }
            } 
            else if (currentMode === 'peace') {
                let isPeace = false;
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const indexUp = lm[8].y < lm[6].y && lm[6].y < lm[5].y;
                    const middleUp = lm[12].y < lm[10].y && lm[10].y < lm[9].y;
                    const ringDown = lm[16].y > lm[14].y;
                    const pinkyDown = lm[20].y > lm[18].y;
                    const isSpread = Math.abs(lm[8].x - lm[12].x) > 0.04; 

                    if (indexUp && middleUp && ringDown && pinkyDown && isSpread) {
                        isPeace = true;
                    }
                }

                if (isPeace && !videoBlurred) {
                    videoElement.style.filter = 'blur(15px)';
                    videoBlurred = true;
                } else if (!isPeace && videoBlurred) {
                    videoElement.style.filter = 'none';
                    videoBlurred = false;
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480 
        });
        camera.start();
    </script>
</body>
</html>
