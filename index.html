<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surveillance Project</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f4f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            border: 3px solid black;
            padding: 10px 20px;
            background-color: #ffb000;
            box-shadow: 4px 4px 0px black;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 2rem);
        }
        .container {
            position: relative;
            border: 5px solid black;
            box-shadow: 6px 6px 0px black;
            margin-top: 1rem;
            background-color: black;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3;
            overflow: hidden;
        }
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
        }
        .controls {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            width: 100%;
            max-width: 640px;
        }
        button {
            flex: 1 1 auto;
            padding: 12px 20px;
            border: 4px solid black;
            background-color: #a3a3a3; 
            color: black;
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 4px 4px 0px black;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px black;
        }
        button.active-mode#btnSpiderman { background-color: #ff5c5c; }
        button.active-mode#btnPeace { background-color: #4ade80; }
    </style>
</head>
<body>
    <h1>Project Iseng yang Diseriusin</h1>
    
    <div class="container">
        <video id="videoElement" autoplay playsinline></video>
        <canvas id="canvasElement" width="640" height="480"></canvas>
    </div>
    
    <div class="controls">
        <button id="btnSpiderman">Portal Mode</button>
        <button id="btnPeace">Peace Blur</button>
    </div>

    <audio id="audioSpiderman" loop><source src="spiderman.mp3" type="audio/mpeg"></audio>
    <audio id="audioPeace" loop><source src="peace.mp3" type="audio/mpeg"></audio>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');
        const canvasCtx = canvasElement.getContext('2d');
        const btnSpiderman = document.getElementById('btnSpiderman');
        const btnPeace = document.getElementById('btnPeace');
        
        const audioSpiderman = document.getElementById('audioSpiderman');
        const audioPeace = document.getElementById('audioPeace');

        let currentMode = ''; 
        let videoBlurred = false; 

        // TRANSLASI CLOSING GESTURE DETECTOR DARI PYTHON
        class ClosingGestureDetector {
            constructor(closeRatio = 0.16, openRatio = 0.30) {
                this.closeRatio = closeRatio;
                this.openRatio = openRatio;
                this.isClosed = false;
            }
            update(width, frameW) {
                const closeThreshold = this.closeRatio * frameW;
                const openThreshold = this.openRatio * frameW;
                let triggered = false;
                
                if (!this.isClosed && width < closeThreshold) {
                    this.isClosed = true;
                    triggered = true;
                } else if (this.isClosed && width > openThreshold) {
                    this.isClosed = false;
                }
                return triggered;
            }
        }
        
        const gestureDetector = new ClosingGestureDetector();
        let filtroIndex = 0;
        const totalFiltros = 5; // Jumlah filter translasi dari OpenCV

        function switchAudio(mode) {
            if (mode === 'spiderman') {
                audioPeace.pause(); audioPeace.currentTime = 0;
                audioSpiderman.play().catch(() => {});
            } else if (mode === 'peace') {
                audioSpiderman.pause(); audioSpiderman.currentTime = 0;
                audioPeace.play().catch(() => {});
            }
        }

        btnSpiderman.addEventListener('click', () => {
            currentMode = 'spiderman';
            btnSpiderman.classList.add('active-mode');
            btnPeace.classList.remove('active-mode');
            if (videoBlurred) { videoElement.style.filter = 'none'; videoBlurred = false; }
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            switchAudio('spiderman');
        });

        btnPeace.addEventListener('click', () => {
            currentMode = 'peace';
            btnPeace.classList.add('active-mode');
            btnSpiderman.classList.remove('active-mode');
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            switchAudio('peace');
        });

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0, 
            minDetectionConfidence: 0.6,
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            if (videoElement.videoWidth && canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (currentMode === 'spiderman') {
                if (results.multiHandLandmarks && results.multiHandLandmarks.length === 2) {
                    // Sorting tangan kiri dan kanan secara kasar berdasarkan X
                    let leftHand, rightHand;
                    if (results.multiHandLandmarks[0][0].x < results.multiHandLandmarks[1][0].x) {
                        leftHand = results.multiHandLandmarks[0];
                        rightHand = results.multiHandLandmarks[1];
                    } else {
                        leftHand = results.multiHandLandmarks[1];
                        rightHand = results.multiHandLandmarks[0];
                    }

                    // 8: Index Tip, 4: Thumb Tip
                    const p1 = {x: leftHand[8].x * canvasElement.width, y: leftHand[8].y * canvasElement.height};
                    const p2 = {x: leftHand[4].x * canvasElement.width, y: leftHand[4].y * canvasElement.height};
                    const p3 = {x: rightHand[8].x * canvasElement.width, y: rightHand[8].y * canvasElement.height};
                    const p4 = {x: rightHand[4].x * canvasElement.width, y: rightHand[4].y * canvasElement.height};

                    // Hitung lebar portal (translasi dari geometry.py)
                    const topW = Math.hypot(p3.x - p1.x, p3.y - p1.y);
                    const bottomW = Math.hypot(p4.x - p2.x, p4.y - p2.y);
                    const portalWidth = (topW + bottomW) / 2.0;

                    // Update detektor gestur
                    if (gestureDetector.update(portalWidth, canvasElement.width)) {
                        filtroIndex = (filtroIndex + 1) % totalFiltros;
                    }

                    // RENDER PORTAL
                    canvasCtx.save();
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x, p1.y);
                    canvasCtx.lineTo(p2.x, p2.y);
                    canvasCtx.lineTo(p4.x, p4.y);
                    canvasCtx.lineTo(p3.x, p3.y);
                    canvasCtx.closePath();
                    
                    canvasCtx.clip();
                    
                    // APLIKASI FILTER DARI PYTHON KE JS
                    if (filtroIndex === 0) {
                        // filtro_3: Aberrasi kromatik / Glitch (Channel shift)
                        canvasCtx.globalCompositeOperation = 'screen';
                        canvasCtx.filter = 'sepia(100%) hue-rotate(-50deg) saturate(300%)';
                        canvasCtx.drawImage(results.image, 15, 0, canvasElement.width, canvasElement.height);
                        canvasCtx.filter = 'sepia(100%) hue-rotate(150deg) saturate(300%)';
                        canvasCtx.drawImage(results.image, -15, 0, canvasElement.width, canvasElement.height);
                        
                    } else if (filtroIndex === 1) {
                        // filtro_grid: Overlay garis grid
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                        canvasCtx.strokeStyle = 'rgba(235, 235, 235, 0.5)';
                        canvasCtx.lineWidth = 1;
                        canvasCtx.beginPath();
                        const step = 22;
                        for(let x=0; x<canvasElement.width; x+=step) { canvasCtx.moveTo(x,0); canvasCtx.lineTo(x, canvasElement.height); }
                        for(let y=0; y<canvasElement.height; y+=step) { canvasCtx.moveTo(0,y); canvasCtx.lineTo(canvasElement.width, y); }
                        canvasCtx.stroke();
                        
                    } else if (filtroIndex === 2) {
                        // filtro_6: Sepia vintage style
                        canvasCtx.filter = 'sepia(80%) contrast(120%) brightness(90%)';
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                        
                    } else if (filtroIndex === 3) {
                        // filtro_1 / filtro_5 alternative: Kontras ekstrem duotone
                        canvasCtx.filter = 'grayscale(100%) contrast(300%)';
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                        canvasCtx.globalCompositeOperation = 'color';
                        canvasCtx.fillStyle = 'rgba(118, 30, 214, 0.7)'; // Warna ungu
                        canvasCtx.fillRect(0, 0, canvasElement.width, canvasElement.height);
                        
                    } else if (filtroIndex === 4) {
                        // filtro_blanco: Kaca blur esmerilado
                        canvasCtx.filter = 'blur(10px) brightness(150%)';
                        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                    }

                    canvasCtx.restore();

                    // Batas portal putih
                    canvasCtx.lineWidth = 2;
                    canvasCtx.strokeStyle = 'white';
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x, p1.y);
                    canvasCtx.lineTo(p2.x, p2.y);
                    canvasCtx.lineTo(p4.x, p4.y);
                    canvasCtx.lineTo(p3.x, p3.y);
                    canvasCtx.closePath();
                    canvasCtx.stroke();
                }
            } 
            else if (currentMode === 'peace') {
                let isPeace = false;
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    const indexUp = lm[8].y < lm[6].y && lm[6].y < lm[5].y;
                    const middleUp = lm[12].y < lm[10].y && lm[10].y < lm[9].y;
                    const ringDown = lm[16].y > lm[14].y;
                    const pinkyDown = lm[20].y > lm[18].y;
                    const isSpread = Math.abs(lm[8].x - lm[12].x) > 0.04; 

                    if (indexUp && middleUp && ringDown && pinkyDown && isSpread) {
                        isPeace = true;
                    }
                }

                if (isPeace && !videoBlurred) {
                    videoElement.style.filter = 'blur(15px)';
                    videoBlurred = true;
                } else if (!isPeace && videoBlurred) {
                    videoElement.style.filter = 'none';
                    videoBlurred = false;
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480 
        });
        camera.start();
    </script>
</body>
</html>
