<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>project iseng</title>
    
    <!-- Load MediaPipe via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    
    <style>
        /* Tema Neobrutalism TVA */
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f4f4f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            border: 3px solid black;
            padding: 10px 20px;
            background-color: #ffb000;
            box-shadow: 4px 4px 0px black;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            font-size: clamp(1.2rem, 4vw, 2rem); /* Responsif font */
        }
        .container {
            position: relative;
            border: 5px solid black;
            box-shadow: 6px 6px 0px black;
            margin-top: 1rem;
            background-color: black;
            width: 100%;
            max-width: 640px;
            aspect-ratio: 4/3; /* Jaga proporsi kamera di mobile */
            overflow: hidden;
        }
        /* Mirror efek dan fill container */
        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1); 
        }
        .controls {
            margin-top: 2rem;
            display: flex;
            flex-wrap: wrap; /* Biar turun ke bawah di HP */
            justify-content: center;
            gap: 1rem;
            width: 100%;
            max-width: 640px;
        }
        button {
            flex: 1 1 auto;
            padding: 12px 20px;
            border: 4px solid black;
            background-color: #ff5c5c;
            color: black;
            font-weight: 900;
            font-size: 1rem;
            box-shadow: 4px 4px 0px black;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0px black;
        }
        button.active-mode {
            background-color: #4ade80;
        }
    </style>
</head>
<body>
    <h1>Project Iseng</h1>
    
    <div class="container">
        <video id="videoElement" autoplay playsinline></video>
        <!-- Internal resolusi canvas tetap, CSS yang ngurus ukurannya di layar -->
        <canvas id="canvasElement" width="640" height="480"></canvas>
    </div>
    
    <div class="controls">
        <button id="btnSpiderman" class="active-mode">Portal Mode</button>
        <button id="btnPeace">Peace Blur</button>
    </div>

    <script>
        const videoElement = document.getElementById('videoElement');
        const canvasElement = document.getElementById('canvasElement');
        const canvasCtx = canvasElement.getContext('2d');
        const btnSpiderman = document.getElementById('btnSpiderman');
        const btnPeace = document.getElementById('btnPeace');

        let currentMode = 'spiderman'; 
        let videoBlurred = false; 

        // Daftar filter ditambah ala "cartoon" (saturasi & kontras tinggi)
        const portalFilters = [
            'invert(100%)',
            'saturate(300%) contrast(200%)', // Efek warna ngejreng ala kartun
            'sepia(100%) hue-rotate(90deg) saturate(200%)', 
            'grayscale(100%) contrast(150%)',
            'hue-rotate(180deg)',
            'blur(8px) contrast(200%)'
        ];
        let currentFilterIndex = 0;
        let wasTwoHandsDetected = false;

        // Ganti Mode
        btnSpiderman.addEventListener('click', () => {
            currentMode = 'spiderman';
            btnSpiderman.classList.add('active-mode');
            btnPeace.classList.remove('active-mode');
            if (videoBlurred) {
                videoElement.style.filter = 'none';
                videoBlurred = false;
            }
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        });

        btnPeace.addEventListener('click', () => {
            currentMode = 'peace';
            btnPeace.classList.add('active-mode');
            btnSpiderman.classList.remove('active-mode');
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        });

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 0, 
            minDetectionConfidence: 0.6, // Naikkan sedikit biar gak asal deteksi
            minTrackingConfidence: 0.5
        });

        hands.onResults((results) => {
            // FIX GAMBAR GEPENG: Samakan ukuran internal kanvas dengan resolusi asli video kamera
            if (videoElement.videoWidth && canvasElement.width !== videoElement.videoWidth) {
                canvasElement.width = videoElement.videoWidth;
                canvasElement.height = videoElement.videoHeight;
            }

            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (currentMode === 'spiderman') {
                const isTwoHands = results.multiHandLandmarks && results.multiHandLandmarks.length === 2;
                
                if (isTwoHands && !wasTwoHandsDetected) {
                    currentFilterIndex = (currentFilterIndex + 1) % portalFilters.length;
                }
                wasTwoHandsDetected = isTwoHands;

                if (isTwoHands) {
                    const hand1 = results.multiHandLandmarks[0];
                    const hand2 = results.multiHandLandmarks[1];
                    
                    const p1 = hand1[8]; // Telunjuk 1
                    const p2 = hand1[4]; // Jempol 1
                    const p3 = hand2[8]; // Telunjuk 2
                    const p4 = hand2[4]; // Jempol 2

                    canvasCtx.save();
                    
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                    canvasCtx.lineTo(p4.x * canvasElement.width, p4.y * canvasElement.height);
                    canvasCtx.lineTo(p3.x * canvasElement.width, p3.y * canvasElement.height);
                    canvasCtx.closePath();
                    
                    canvasCtx.clip();
                    
                    canvasCtx.filter = portalFilters[currentFilterIndex];
                    
                    canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
                    
                    canvasCtx.restore();

                    canvasCtx.lineWidth = 4;
                    canvasCtx.strokeStyle = 'white';
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(p1.x * canvasElement.width, p1.y * canvasElement.height);
                    canvasCtx.lineTo(p2.x * canvasElement.width, p2.y * canvasElement.height);
                    canvasCtx.lineTo(p4.x * canvasElement.width, p4.y * canvasElement.height);
                    canvasCtx.lineTo(p3.x * canvasElement.width, p3.y * canvasElement.height);
                    canvasCtx.closePath();
                    canvasCtx.stroke();
                }
            } 
            else if (currentMode === 'peace') {
                let isPeace = false;
                
                if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                    const lm = results.multiHandLandmarks[0];
                    
                    // FIX DETEKSI PEACE: Logika diperketat
                    // 1. Telunjuk dan Tengah harus tegak (ujung di atas pangkal)
                    const indexUp = lm[8].y < lm[6].y && lm[6].y < lm[5].y;
                    const middleUp = lm[12].y < lm[10].y && lm[10].y < lm[9].y;
                    
                    // 2. Manis dan Kelingking harus benar-benar menekuk ke bawah
                    const ringDown = lm[16].y > lm[14].y;
                    const pinkyDown = lm[20].y > lm[18].y;
                    
                    // 3. Harus ada jarak mendatar (X) antara telunjuk dan jari tengah biar gak cuma ngacungin 1 jari rapat
                    const isSpread = Math.abs(lm[8].x - lm[12].x) > 0.04; 

                    if (indexUp && middleUp && ringDown && pinkyDown && isSpread) {
                        isPeace = true;
                    }
                }

                if (isPeace && !videoBlurred) {
                    videoElement.style.filter = 'blur(15px)';
                    videoBlurred = true;
                } else if (!isPeace && videoBlurred) {
                    videoElement.style.filter = 'none';
                    videoBlurred = false;
                }
            }
        });

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480 // Ini resolusi request kamera, nanti dicocokkan dinamis di atas
        });
        camera.start();
    </script>
</body>
</html>
